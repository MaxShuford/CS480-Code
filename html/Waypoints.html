<!DOCTYPE html>

<html lang="en">

<head>
        <title>Moogle Gaps</title>
        <link rel="stylesheet" href="../css/main.css"> 
        <link rel="stylesheet" href="../css/header.css">    
</head>


<body>

    <header>

        <div id="title">
        <h1>Moogle Gaps</h1>
        </div>

        <div id="profileIcon">

        </div>
    </header>
    
    <main>
        
        <section>
                
            <img src="../css/TEMPFILE/FakeMap.png" alt="Map" id="theMap">
               
        </section>

        <aside>
            <form>
                <div>
                    <input type="text" name="startCity" class="cityBox" placeholder="Start">

                    <img src="../css/Images/ArrowIcon.png" alt="DownArrow" class="arrow">
                </div>
                
                <div id="endTextbox">
                    <input type="text" name="destinationCity" class="cityBox" placeholder="Destination">

                    <button type="button" id="wayAdd">+</button>
                </div>

                <input type="button" value="Get Route" class="buttons" id="GetRoute">
            </form>
        </aside>


    </main>

    <script src="../js/Waypoints.js"></script>

</body>

</html>
