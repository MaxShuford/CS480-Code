<!DOCTYPE html>

<html lang="en">

<head>
        <title>Moogle Gaps</title>
        <link rel="stylesheet" href="../css/main.css"> 
        <link rel="stylesheet" href="../css/header.css"> 

        
        
        <!--Jquery Style Links-->
        <link rel="stylesheet" href="https://code.jquery.com/ui/1.14.2/themes/base/jquery-ui.css">
        <link rel="stylesheet" href="/resources/demos/style.css">

        <!--Jquery Scripts for UI-->
        <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
        <script src="https://code.jquery.com/ui/1.14.2/jquery-ui.js"></script> 

</head>


<body>

    <header>

        <div id="title">
        <h1>Moogle Gaps</h1>
        </div>

        <div id="profileIcon">

        </div>
    </header>
    
    <main>
        
        <section>
                
            <img src="../css/TEMPFILE/FakeMap.png" alt="Map" id="theMap">
               
        </section>

        <aside>
            <form>
                <div>
                    <input type="text" name="startCity" class="cityBox" placeholder="Start">

                    <img src="../css/Images/ArrowIcon.png" alt="DownArrow" class="arrow">
                </div>
                
                <div id="endTextbox">
                    <input type="text" name="destinationCity" class="cityBox" placeholder="Destination">

                    <button type="button" id="wayAdd">+</button>
                </div>

                <input type="button" value="Get Route" class="buttons" id="GetRoute">
            </form>

            <div id="accordion">
                <h3>Favorites</h3>

                    <div id="favorites">
                        <ul>
                            
                        </ul>
                    </div>   
            </div>
        </aside>


    </main>

    

    <!--Waypoints JS-->
    <script src="../js/Waypoints.js"></script>
    <script src="../js/Favorites.js"></script>

</body>

</html>
