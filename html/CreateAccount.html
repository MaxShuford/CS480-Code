<!DOCTYPE html>

<html lang="en">

<head>
        <title>Moogle Gaps: Create Account</title>
        <link rel="stylesheet" href="../css/ua.css">    
</head>


<body>

    <header class="backButton">
        <h2><a href="Login.html">Back To Login</a></h2>
    </header>
    
    <main>
        <div class="userForm">
            <section>
                <h2>Create a Moogle Gaps Account</h2>
                <form method="post" id="createAccount">
                    <h3>Username: <input type="text" name="username" placeholder="Username"><span>*</span></h3>   
                    <h3>Password: <input type="password" name="password" placeholder="Password"><span>*</span></h3>
                    <h3>Confirm Password: <input type="password" name="confirmPassword" placeholder="Confirm Password"><span>*</span></h3>

                    <input type="button" value="Create Account">
                </form>
            </section>
        </div>

    </main>
    

<script src="../js/userAuthFunctions.js"></script>
<script src="../js/CreateAccount.js"></script>
</body>


</html>
