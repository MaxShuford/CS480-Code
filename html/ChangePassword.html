<!DOCTYPE html>

<html lang="en">

<head>
        <title>Moogle Gaps: Change Password</title>
        <link rel="stylesheet" href="../CSS/ua.css"> 
        <link rel="stylesheet" href="../css/header.css">
          
</head>


<body>

    <header>
        <div class="backButton"> 
            <img src="../css/Images/BackIcon.png" alt="BackIcon" id="backIcon">
            <h2>Back To Home</h2>
        </div>

        <div id="profileIcon" class="nonExtend">
            <ul id="profileDrop">
                <li id="firstBar">
                    <span>USERNAME</span>
                    <img src="../css/Images/UserIcon.png" class="profile">
                </li>
            </ul>
        </div>

    </header>
    
    <main>
        <body>
            <div class="userForm">

                    <h2>Change Password</h2>
                
                    <form method="post" id="changePassword" action="Waypoints.html">
                        <h3>Old Password: <input type="password" name="oldPassword" placeholder="Old Password"><span>*</span></h3>   
                        <h3>New Password: <input type="password" name="newPassword" placeholder="New Password"><span>*</span></h3>
                        <h3>Confirm Password: <input type="password" name="confirmPassword" placeholder="Confirm Password"><span>*</span></h3>

                        <input type="button" value="Change Password" class="buttons">
                    </form>
            </div>
        </body>

    </main>
    

<script src="../js/userAuthFunctions.js"></script>
<script src="../js/changePassword.js"></script>
</body>


</html>
