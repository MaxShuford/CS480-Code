<!DOCTYPE html>

<html lang="en">

<head>
        <title>Moogle Gaps: Change Password</title>
        <link rel="stylesheet" href="../CSS/ua.css">    
</head>


<body>

    <header class="backButton">
        <h2><a href="">Back To Home</a></h2>
    </header>
    
    <main>
        <div class="userForm">
            <section>
                <h2>Change Password</h2>
                <form method="post" id="changePassword">
                    <h3>Old Password: <input type="password" name="oldPassword"></h3>   
                    <h3>New Password: <input type="password" name="newPassword"></h3>
                    <h3>Confirm Password: <input type="password" name="confirmPassword"></h3>

                    <input type="button" value="Change Password">
                </form>
            </section>
        </div>

    </main>
    


</body>


</html>
